<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bloom Customer Care — Firestore Setup</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #1a1a2e; color: #fff; }
    button { padding: 12px 24px; background: #b22025; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 8px 4px; }
    button:hover { background: #8b191d; }
    #log { margin-top: 20px; padding: 16px; background: #0d0d1a; border-radius: 8px; min-height: 200px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
    .ok  { color: #16a34a; } .err { color: #dc2626; } .inf { color: #6b7280; }
  </style>
</head>
<body>
<h2 style="color:#b22025">🔧 Bloom Customer Care — Firestore Setup</h2>
<p style="color:#6b7280;margin-bottom:20px">Run ONCE on the new bloom-customercare Firebase project</p>
<button onclick="runSetup()">▶ Run Full Setup</button>
<div id="log">Ready — click Run Full Setup to start...</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, collection, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCccdLw-wMiy4YahpU8lq6PxJJoDra1g5s",
  authDomain: "bloom-customercare.firebaseapp.com",
  projectId: "bloom-customercare",
  storageBucket: "bloom-customercare.firebasestorage.app",
  messagingSenderId: "925494560966",
  appId: "1:925494560966:web:2c8bfadbc125f0f6ae2fc7"
};

const app  = initializeApp(FIREBASE_CONFIG);
const db   = getFirestore(app);
const auth = getAuth(app);
await signInAnonymously(auth);

const logEl = document.getElementById('log');
function print(msg, type='inf') {
  logEl.innerHTML += '<span class="'+type+'">'+msg+'\n</span>';
  logEl.scrollTop = logEl.scrollHeight;
}

window.runSetup = async function() {
  logEl.innerHTML = '';
  print('Starting Customer Care setup on bloom-customercare project...\n');
  try {
    // ── Stores ──────────────────────────────────────────────────────────────
    print('📦 Creating stores...');
    const stores = [
      { id:'WN01', name:'Wadi Al Nile',    email:'a.saied@bloom.com.eg'              },
      { id:'P902', name:'Point 90',         email:'e.omran@bloom.com.eg'              },
      { id:'CA03', name:'Capital',          email:'o.sameh@bloom.com.eg'              },
      { id:'AL04', name:'Almaza',           email:'b.ibrahim@bloom.com.eg'            },
      { id:'MO05', name:'Mall of Arabia',   email:'n.ahmed@bloom.com.eg'              },
      { id:'UP06', name:'Uptown',           email:'m.emaad@bloom.com.eg'              },
      { id:'S307', name:'Street 31',        email:'a.dory@bloom.com.eg'               },
      { id:'DP08', name:'Diplo',            email:'a.elshamaa@bloom.com.eg'           },
      { id:'OS05', name:'Online Store',     email:'customersupport@bloompharmacy.com' },
    ];
    for (const s of stores) {
      await setDoc(doc(db,'stores',s.id), { name:s.name, email:s.email, active:true, ticket_counter:0 });
      print('  ✓ '+s.name+' ('+s.id+')');
    }
    print('✅ Stores done\n','ok');

    // ── Admins ───────────────────────────────────────────────────────────────
    print('👤 Creating admins...');
    const admins = [
      { username:'H.haddad', password:'4862', email:'h.elhaddad@bloom.com.eg' },
      { username:'M.saad',   password:'3664', email:'m.saad@bloom.com.eg'     },
      { username:'M.mohie',  password:'2437', email:'M.mohie@bloom.com.eg'    },
    ];
    for (const a of admins) {
      await setDoc(doc(db,'users',a.username), { username:a.username, password:a.password, role:'admin', store_id:null, email:a.email });
      print('  ✓ '+a.username+' (admin)');
    }
    print('✅ Admins done\n','ok');

    // ── Managers ─────────────────────────────────────────────────────────────
    print('👔 Creating branch managers...');
    const managers = [
      { username:'a.saeid',    password:'3927', store_id:'WN01', email:'a.saied@bloom.com.eg'              },
      { username:'e.omran',    password:'8104', store_id:'P902', email:'e.omran@bloom.com.eg'              },
      { username:'o.sameh',    password:'5592', store_id:'CA03', email:'o.sameh@bloom.com.eg'              },
      { username:'b.ibrahim',  password:'1738', store_id:'AL04', email:'b.ibrahim@bloom.com.eg'            },
      { username:'n.ahmed',    password:'6041', store_id:'MO05', email:'n.ahmed@bloom.com.eg'              },
      { username:'m.emaad',    password:'9283', store_id:'UP06', email:'m.emaad@bloom.com.eg'              },
      { username:'a.dory',     password:'4416', store_id:'S307', email:'a.dory@bloom.com.eg'               },
      { username:'a.elshamaa', password:'2075', store_id:'DP08', email:'a.elshamaa@bloom.com.eg'           },
      { username:'S.adel',     password:'1256', store_id:'OS05', email:'customersupport@bloompharmacy.com' },
    ];
    for (const m of managers) {
      await setDoc(doc(db,'users',m.username), { username:m.username, password:m.password, role:'manager', store_id:m.store_id, email:m.email });
      print('  ✓ '+m.username+' → '+m.store_id);
    }
    print('✅ Managers done\n','ok');

    print('🎉 SETUP COMPLETE! Project: bloom-customercare\n','ok');
    print('Test URLs:','ok');
    stores.forEach(s => print('  '+s.name+': ?storeId='+s.id+'&storeName='+encodeURIComponent(s.name),'ok'));
  } catch(e) {
    print('\n❌ Error: '+e.message,'err');
    print('Make sure Firestore + Anonymous Auth are enabled in Firebase console','err');
  }
};
</script>
</body>
</html>
